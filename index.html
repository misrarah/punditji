<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/om.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Pandit Alabhaya Tiwari – Hindu Puja and Ritual Services in Greater London. Satyanarayan Katha, Grah Pravesh, Hawan, Annaprasan and more." />
    <title>Pandit Alabhaya Tiwari – Hindu Puja Services, London</title>
    <!-- Restore path after GitHub Pages 404 redirect -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?')
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          )
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
